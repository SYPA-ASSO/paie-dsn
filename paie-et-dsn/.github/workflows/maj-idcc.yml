name: Mise a jour liste IDCC

on:
  # Cron desactive : la source officielle est protegee par un captcha,
  # la mise a jour mensuelle est manuelle (voir scripts/maj-idcc.mjs).
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  maj:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install xlsx --no-save --no-audit --no-fund
      - run: node scripts/maj-idcc.mjs
      - name: Commit si changement
        run: |
          if [ -n "$(git status --porcelain data/idcc.json)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add data/idcc.json
            git commit -m "maj: liste officielle des conventions collectives"
            git push
          else
            echo "Aucun changement a committer."
          fi
